<!DOCTYPE html>
<html>
<head>
    <title>Assignment 7</title>
</head>
<body>
    <h1>Month and year Calendar</h1>
    <!-- Q- make calender which takes month and year and tell about month days also follow leap year? -->

    <label for="month">Select Month:</label>
    <select id="month">
        <option value="1">January</option>
        <option value="2">February</option>
        <option value="3">March</option>
        <option value="4">April</option>
        <option value="5">May</option>
        <option value="6">June</option>
        <option value="7">July</option>
        <option value="8">August</option>
        <option value="9">September</option>
        <option value="10">October</option>
        <option value="11">November</option>
        <option value="12">December</option>
    </select>

    <label for="year">Enter Year:</label>
    <input type="number" id="year" min="1" step="1" />

    <button onclick="calculateDays()">Calculate Days</button>

    <p id="result"></p>

    <script>
        function calculateDays() {
            const month = parseInt(document.getElementById("month").value, 10);
            const year = parseInt(document.getElementById("year").value, 10);

            const daysInMonth = new Date(year, month, 0).getDate();

            document.getElementById("result").textContent = `There are ${daysInMonth} days in the selected month.`;
        }
    </script>
</body>
</html>
