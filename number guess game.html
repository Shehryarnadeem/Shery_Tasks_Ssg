<!DOCTYPE html>
<html>
<head>
    <title>Number Guessing Game</title>
</head>
<body>
    <h1>Number Guessing Game</h1>
    <p>Guess a number between 1 and 50:</p>
    <label for="userGuess">Enter your number:</label>
    <input type="number" id="userGuess">
    <button onclick="checkGuess()">Check Guess</button>
    <p id="result"></p>

    <script>
        let randomNumber = Math.floor(Math.random() * 50);

        function checkGuess() {
            const userGuess = parseInt(document.getElementById("userGuess").value);
            let resultMessage = "";

            if (userGuess === randomNumber) {
                resultMessage = "You won the game! The random number was " + randomNumber;
            } else if (userGuess > randomNumber) {
                resultMessage = "You lose the game! The random number was " + randomNumber + " (smaller)";
            } else {
                let allValues = Array.from({ length: 50 }, (_, i) => i + 1);
                resultMessage = "You won the game! " + allValues.join(', ') + ". The random number was " + randomNumber;
            }

            document.getElementById("result").textContent = resultMessage;
        }
    </script>
</body>
</html>
